# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]
assertj = "3.27.7"
errorprone = "2.31.0"
jspecify = "1.0.0"
junit-jupiter = "5.14.4"
logback = "1.3.16"                     # Logback 1.4.x and 1.5.x require Java 11
nullaway = "0.11.0"
slf4j = "2.0.18"

[libraries]
assertj-core = { group = "org.assertj", name = "assertj-core", version.ref = "assertj" }
errorprone-core = { group = "com.google.errorprone", name = "error_prone_core", version.ref = "errorprone" }
nullaway = { group = "com.uber.nullaway", name = "nullaway", version.ref = "nullaway" }
junit-jupiter-api = { group = "org.junit.jupiter", name = "junit-jupiter-api", version.ref = "junit-jupiter" }
jspecify = { group = "org.jspecify", name = "jspecify", version.ref = "jspecify" }
logback-classic = { group = "ch.qos.logback", name = "logback-classic", version.ref = "logback" }
slf4j = { group = "org.slf4j", name = "slf4j-api", version.ref = "slf4j" }
